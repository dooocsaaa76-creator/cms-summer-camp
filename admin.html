<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 | CMS 서초영재관 특강 신청 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Gowun+Dodum&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16243E; --ink-soft:#33425C; --paper:#F3F5F1; --paper-grid:#DCE3DD;
    --card:#FFFFFF; --teal:#1F7A6C; --teal-dark:#14564C; --teal-pale:#E3F1EC;
    --red:#D64545; --red-pale:#FBE7E4; --yellow:#F4B73F; --muted:#5C6B66; --line:#D9E0DA;
    --font-display:'Song Myung', serif; --font-body:'Gowun Dodum', sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.6;
    background-image:linear-gradient(var(--paper-grid) 1px, transparent 1px),linear-gradient(90deg, var(--paper-grid) 1px, transparent 1px);
    background-size:28px 28px;min-height:100vh;
  }
  :focus-visible{outline:3px solid var(--yellow); outline-offset:2px;}

  /* 로그인 게이트 */
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .gate-box{
    background:var(--card);border:2px solid var(--ink);border-radius:18px;
    padding:40px 34px;max-width:380px;width:100%;text-align:center;box-shadow:0 12px 30px rgba(22,36,62,.12);
  }
  .gate-box .eyebrow{
    font-family:var(--font-mono);font-size:12px;color:var(--teal-dark);background:var(--teal-pale);
    border:1px solid var(--teal);border-radius:999px;padding:4px 12px;display:inline-block;margin-bottom:14px;
  }
  .gate-box h1{font-family:var(--font-display);font-size:24px;margin:0 0 18px;}
  .gate-box input{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:8px;
    font-family:var(--font-body);font-size:14.5px;margin-bottom:12px;
  }
  .gate-box input:focus{border-color:var(--teal);}
  .gate-box button{
    width:100%;padding:13px;border:none;border-radius:10px;background:var(--ink);color:#fff;
    font-family:var(--font-body);font-weight:700;font-size:15px;cursor:pointer;
  }
  .gate-box button:hover{background:var(--teal-dark);}
  .gate-error{color:var(--red);font-size:13.5px;margin-top:12px;display:none;}

  /* 대시보드 */
  #dashboard{display:none;max-width:1040px;margin:0 auto;padding:36px 20px 70px;}
  .dash-header{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .dash-header h1{font-family:var(--font-display);font-size:28px;margin:0;}
  .dash-actions{display:flex;gap:8px;}
  .btn-sm{
    font-family:var(--font-body);font-weight:700;font-size:13.5px;border:1.5px solid var(--ink);
    border-radius:999px;padding:8px 16px;background:var(--card);cursor:pointer;color:var(--ink);
  }
  .btn-sm:hover{background:var(--ink);color:#fff;}
  .btn-sm.primary{background:var(--teal-dark);border-color:var(--teal-dark);color:#fff;}
  .btn-sm.primary:hover{background:var(--ink);}
  .btn-sm.danger{border-color:var(--red);color:var(--red);}
  .btn-sm.danger:hover{background:var(--red);color:#fff;}
  .dash-sub{color:var(--muted);font-size:13px;margin-bottom:18px;font-family:var(--font-mono);}

  /* 탭 */
  .tabs{display:flex;gap:6px;margin-bottom:26px;border-bottom:2px solid var(--ink);}
  .tab-btn{
    font-family:var(--font-body);font-weight:700;font-size:15px;padding:10px 18px;border:none;
    background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;
  }
  .tab-btn.active{color:var(--ink);border-bottom-color:var(--teal-dark);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  .summary-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:26px;}
  .summary-card{background:var(--card);border:1.5px solid var(--ink);border-radius:12px;padding:16px 22px;flex:1 1 160px;}
  .summary-card .num{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--teal-dark);}
  .summary-card .label{font-size:13px;color:var(--muted);}

  .search-row{margin-bottom:22px;}
  .search-row input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-family:var(--font-body);font-size:14.5px;background:var(--card);}
  .search-row input:focus{border-color:var(--teal);}

  .course-group{background:var(--card);border:1.5px solid var(--ink);border-radius:14px;margin-bottom:18px;overflow:hidden;}
  .course-group summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;font-family:var(--font-display);font-size:17px;}
  .course-group summary::-webkit-details-marker{display:none;}
  .course-group summary .arrow{font-family:var(--font-mono);font-size:13px;color:var(--muted);transition:transform .15s ease;}
  .course-group[open] summary .arrow{transform:rotate(90deg);}
  .course-group summary .count{font-family:var(--font-mono);font-size:12.5px;background:var(--teal-pale);color:var(--teal-dark);border:1px solid var(--teal);border-radius:999px;padding:2px 10px;margin-left:10px;}
  table.roster{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed;}
  table.roster th{text-align:left;font-family:var(--font-mono);font-size:11.5px;color:var(--muted);border-top:1px solid var(--line);padding:10px 14px 8px;background:var(--paper);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  table.roster td{padding:10px 14px;border-top:1px dashed var(--line);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;vertical-align:middle;}
  table.roster tr:nth-child(even) td{background:rgba(31,122,108,0.03);}
  table.roster .col-name{width:13%;}
  table.roster .col-school{width:18%;}
  table.roster .col-grade{width:9%;}
  table.roster .col-phone{width:17%;}
  table.roster .col-enrolled{width:11%;}
  table.roster .col-del{width:8%;text-align:center;}
  .tag-enrolled{font-family:var(--font-mono);font-size:11.5px;padding:2px 8px;border-radius:6px;}
  .tag-enrolled.in{background:var(--teal-pale);color:var(--teal-dark);}
  .tag-enrolled.out{background:#FFF3DD;color:#8a6212;}
  .del-row-btn{
    background:none;border:1px solid var(--red);color:var(--red);border-radius:6px;
    font-size:12px;padding:3px 8px;cursor:pointer;font-family:var(--font-mono);
  }
  .del-row-btn:hover{background:var(--red);color:#fff;}
  .empty-state{text-align:center;color:var(--muted);padding:60px 20px;font-family:var(--font-mono);font-size:14px;}

  /* 강좌 관리 */
  .seed-banner{
    background:var(--ink);color:#fff;border-radius:14px;padding:22px;margin-bottom:24px;
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;
  }
  .seed-banner p{margin:0;font-size:14px;color:#dfe6e2;}
  .seed-banner button{background:var(--yellow);border:none;color:var(--ink);font-weight:700;padding:11px 18px;border-radius:999px;cursor:pointer;font-family:var(--font-body);}

  .course-row{
    background:var(--card);border:1.5px solid var(--line);border-radius:12px;
    padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }
  .course-row .ctitle{font-family:var(--font-display);font-size:16.5px;}
  .course-row .ctarget{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .course-row .cbadge{font-family:var(--font-mono);font-size:11px;background:var(--teal-pale);color:var(--teal-dark);border:1px solid var(--teal);border-radius:6px;padding:2px 8px;margin-right:8px;}

  /* 모달 (강좌 수정) */
  .overlay{position:fixed;inset:0;background:rgba(22,36,62,.55);display:none;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto;z-index:100;}
  .overlay.open{display:flex;}
  .modal{background:var(--card);max-width:640px;width:100%;border-radius:18px;border:2px solid var(--ink);padding:28px 26px 26px;position:relative;}
  .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink);width:34px;height:34px;border-radius:50%;}
  .modal-close:hover{background:var(--paper-grid);}
  .modal h2{font-family:var(--font-display);font-size:22px;margin:0 0 18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;}
  .field input[type=text], .field select, .field textarea{
    width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-family:var(--font-body);font-size:14px;
  }
  .field textarea{resize:vertical;min-height:70px;}
  .field .hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .variant-edit-row{display:flex;gap:6px;margin-bottom:8px;align-items:center;}
  .variant-edit-row input{flex:1;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;}
  .variant-edit-row button{
    flex:0 0 auto;background:var(--red-pale);color:var(--red);border:1px solid var(--red);border-radius:8px;
    width:32px;height:32px;cursor:pointer;font-size:14px;
  }
  .add-variant-btn{
    font-size:13px;border:1.5px dashed var(--teal);color:var(--teal-dark);background:var(--teal-pale);
    border-radius:8px;padding:7px 12px;cursor:pointer;font-family:var(--font-body);font-weight:700;
  }
  .modal-actions{display:flex;gap:8px;margin-top:20px;}
  .modal-actions .save-btn{flex:1;padding:13px;border:none;border-radius:10px;background:var(--teal-dark);color:#fff;font-weight:700;cursor:pointer;font-family:var(--font-body);font-size:15px;}
  .modal-actions .save-btn:hover{background:var(--ink);}
  .modal-actions .delete-btn{padding:13px 16px;border:1.5px solid var(--red);color:var(--red);background:#fff;border-radius:10px;cursor:pointer;font-family:var(--font-body);font-weight:700;}
  .modal-actions .delete-btn:hover{background:var(--red);color:#fff;}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <span class="eyebrow">ADMIN ONLY</span>
    <h1>관리자 페이지</h1>
    <input type="email" id="emailInput" placeholder="관리자 이메일" autocomplete="username">
    <input type="password" id="pwInput" placeholder="비밀번호" autocomplete="current-password">
    <button id="loginBtn">로그인</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<div id="dashboard">
  <div class="dash-header">
    <h1>CMS 서초영재관 관리자</h1>
    <div class="dash-actions">
      <a href="index.html" class="btn-sm" style="text-decoration:none;">← 신청페이지</a>
      <button class="btn-sm" id="logoutBtn">로그아웃</button>
    </div>
  </div>
  <div class="dash-sub" id="updatedAt">실시간으로 동기화됩니다.</div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="applications">신청 현황</button>
    <button class="tab-btn" data-tab="courses">강좌 관리</button>
  </div>

  <div class="tab-panel active" id="tab-applications">
    <div class="summary-row" id="summaryRow"></div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="이름 또는 학교로 검색...">
    </div>
    <div id="groupsRoot"></div>
  </div>

  <div class="tab-panel" id="tab-courses">
    <div class="seed-banner" id="seedBanner" style="display:none;">
      <p>아직 강좌 정보가 비어 있습니다. 안내드린 19개 강좌 기본 데이터를 한 번에 불러올까요?</p>
      <button id="seedBtn">초기 강좌 데이터 업로드</button>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
      <button class="btn-sm primary" id="newCourseBtn">+ 새 강좌 추가</button>
    </div>
    <div id="courseListRoot"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCI98mwQ4lz3h0yzFfooTqXjrsdzyQArU",
  authDomain: "cms-summer-camp.firebaseapp.com",
  projectId: "cms-summer-camp",
  storageBucket: "cms-summer-camp.firebasestorage.app",
  messagingSenderId: "506548644045",
  appId: "1:506548644045:web:6fb7f90d37d5891747a184"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

const CATEGORY_ORDER = ["고등","중등","초등","프리미엄관"];
let ALL_APPLICATIONS = [];
let ALL_COURSES = [];
let unsubApplications = null;
let unsubCourses = null;

/* ============================================================
   로그인
============================================================ */
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('pwInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') login(); });

async function login(){
  const email = document.getElementById('emailInput').value.trim();
  const pw = document.getElementById('pwInput').value;
  const errEl = document.getElementById('gateError');
  errEl.style.display='none';
  if(!email || !pw) return;
  document.getElementById('loginBtn').textContent = '확인 중...';
  try{
    await signInWithEmailAndPassword(auth, email, pw);
  }catch(err){
    errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    errEl.style.display='block';
  }finally{
    document.getElementById('loginBtn').textContent = '로그인';
  }
}

document.getElementById('logoutBtn').addEventListener('click', ()=> signOut(auth));

onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById('gate').style.display='none';
    document.getElementById('dashboard').style.display='block';
    startListeners();
  }else{
    document.getElementById('dashboard').style.display='none';
    document.getElementById('gate').style.display='flex';
    if(unsubApplications) unsubApplications();
    if(unsubCourses) unsubCourses();
  }
});

/* ============================================================
   탭 전환
============================================================ */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

/* ============================================================
   실시간 리스너
============================================================ */
function startListeners(){
  const aq = query(collection(db, "applications"), orderBy("createdAt", "desc"));
  unsubApplications = onSnapshot(aq, (snap)=>{
    ALL_APPLICATIONS = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderApplications();
  }, (err)=>{
    console.error(err);
    document.getElementById('groupsRoot').innerHTML =
      `<div class="empty-state">신청 내역을 불러오지 못했습니다: ${err.message}</div>`;
  });

  const cq = collection(db, "courses");
  unsubCourses = onSnapshot(cq, (snap)=>{
    ALL_COURSES = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderCourseList();
  }, (err)=>{
    console.error(err);
    document.getElementById('courseListRoot').innerHTML =
      `<div class="empty-state">강좌 정보를 불러오지 못했습니다: ${err.message}</div>`;
  });
}

document.getElementById('searchInput').addEventListener('input', renderApplications);

function categoryOf(courseStr){
  const m = /^\[(.+?)\]/.exec(courseStr || "");
  return m ? m[1] : "기타";
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

/* ============================================================
   신청 현황 탭
============================================================ */
function renderApplications(){
  document.getElementById('updatedAt').textContent = `실시간 동기화 중 · 마지막 갱신 ${new Date().toLocaleTimeString('ko-KR')}`;

  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  const rows = ALL_APPLICATIONS.filter(r=>{
    if(!keyword) return true;
    return (r.studentName||'').toLowerCase().includes(keyword) || (r.school||'').toLowerCase().includes(keyword);
  });

  const courseSet = new Set(ALL_APPLICATIONS.map(r=>r.course));
  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-card"><div class="num">${ALL_APPLICATIONS.length}</div><div class="label">총 신청 건수</div></div>
    <div class="summary-card"><div class="num">${courseSet.size}</div><div class="label">신청된 강좌 수</div></div>
    <div class="summary-card"><div class="num">${ALL_APPLICATIONS.filter(r=>r.enrolled==='재원생').length}</div><div class="label">재원생</div></div>
    <div class="summary-card"><div class="num">${ALL_APPLICATIONS.filter(r=>r.enrolled==='외부생').length}</div><div class="label">외부생</div></div>
  `;

  const root = document.getElementById('groupsRoot');
  if(!ALL_APPLICATIONS.length){ root.innerHTML = `<div class="empty-state">아직 접수된 신청이 없습니다.</div>`; return; }
  if(!rows.length){ root.innerHTML = `<div class="empty-state">검색 결과가 없습니다.</div>`; return; }

  const groups = {};
  rows.forEach(r=>{
    const key = r.course || '(특강 미선택)';
    if(!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  const sortedKeys = Object.keys(groups).sort((a,b)=>{
    const ca = CATEGORY_ORDER.indexOf(categoryOf(a));
    const cb = CATEGORY_ORDER.indexOf(categoryOf(b));
    if(ca !== cb) return (ca<0?99:ca) - (cb<0?99:cb);
    return a.localeCompare(b, 'ko');
  });

  root.innerHTML = sortedKeys.map(course=>{
    const list = groups[course];
    return `
      <details class="course-group" open>
        <summary><span><span class="arrow">▶</span> &nbsp;${escapeHtml(course)}</span><span class="count">${list.length}명</span></summary>
        <table class="roster">
          <colgroup>
            <col class="col-name"><col class="col-school"><col class="col-grade">
            <col class="col-phone"><col class="col-enrolled"><col class="col-del">
          </colgroup>
          <tr>
            <th>이름</th><th>학교</th><th>학년</th>
            <th>연락처</th><th>재원여부</th><th></th>
          </tr>
          ${list.map(r=>`
            <tr>
              <td>${escapeHtml(r.studentName)}</td>
              <td>${escapeHtml(r.school)}</td>
              <td>${escapeHtml(r.grade)}</td>
              <td>${escapeHtml(r.phone||'')}</td>
              <td><span class="tag-enrolled ${r.enrolled==='재원생'?'in':'out'}">${escapeHtml(r.enrolled)}</span></td>
              <td><button class="del-row-btn" data-docid="${r.id}">삭제</button></td>
            </tr>`).join('')}
        </table>
      </details>`;
  }).join('');

  // 삭제 버튼 이벤트 (이벤트 위임)
  root.querySelectorAll('.del-row-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const name = btn.closest('tr').querySelector('td').textContent;
      if(!confirm(`'${name}' 학생의 신청 내역을 삭제할까요? 복구할 수 없습니다.`)) return;
      btn.disabled = true; btn.textContent = '삭제 중...';
      try{
        await deleteDoc(doc(db, "applications", btn.dataset.docid));
      }catch(err){
        alert('삭제 중 문제가 발생했습니다: ' + err.message);
        btn.disabled = false; btn.textContent = '삭제';
      }
    });
  });
}

/* ============================================================
   강좌 관리 탭
============================================================ */
function renderCourseList(){
  document.getElementById('seedBanner').style.display = ALL_COURSES.length===0 ? 'flex' : 'none';

  const root = document.getElementById('courseListRoot');
  if(!ALL_COURSES.length){ root.innerHTML=''; return; }

  const sorted = [...ALL_COURSES].sort((a,b)=>{
    const ca = CATEGORY_ORDER.indexOf(a.category);
    const cb = CATEGORY_ORDER.indexOf(b.category);
    if(ca!==cb) return (ca<0?99:ca)-(cb<0?99:cb);
    return (a.order||0)-(b.order||0);
  });

  root.innerHTML = sorted.map(c=>`
    <div class="course-row">
      <div>
        <span class="cbadge">${escapeHtml(c.category)}</span>

function openCourseModal(id){
  const c = id ? ALL_COURSES.find(x=>x.id===id) : {
    category:"고등", title:"", textbook:"자체교재", target:"", feature:"", note:"",
    variants:[{label:"월수금반", time:"", period:""}], sessions:[]
  };
  const modal = document.getElementById('modalBody');
  modal.innerHTML = `
    <button class="modal-close" id="modalClose">✕</button>
    <h2>${id ? '강좌 수정' : '새 강좌 추가'}</h2>
    <div class="field">
      <label>카테고리</label>
      <select id="f-category">
        ${CATEGORY_ORDER.map(cat=>`<option value="${cat}" ${c.category===cat?'selected':''}>${cat}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>강좌명</label><input type="text" id="f-title" value="${escapeHtml(c.title)}"></div>
    <div class="field"><label>교재</label><input type="text" id="f-textbook" value="${escapeHtml(c.textbook)}"></div>
    <div class="field"><label>수업대상</label><input type="text" id="f-target" value="${escapeHtml(c.target)}"></div>
    <div class="field">
      <label>대상/특징 설명</label>
      <textarea id="f-feature">${escapeHtml(c.feature)}</textarea>
      <div class="hint">줄바꿈으로 문단을 구분할 수 있어요.</div>
    </div>
    <div class="field"><label>휴강 안내 (선택)</label><input type="text" id="f-note" value="${escapeHtml(c.note||'')}" placeholder="예: 학원 방학 7/26(일) ~ 8/1(토) 기간은 휴강입니다."></div>
    <div class="field">
      <label>회차 및 시간 / 개강~종강</label>
      <div id="variantRows"></div>
      <button type="button" class="add-variant-btn" id="addVariantBtn">+ 일정 추가</button>
    </div>
    <div class="field">
      <label>회차별 진도계획</label>
      <textarea id="f-sessions" style="min-height:120px;">${(c.sessions||[]).join('\n')}</textarea>
      <div class="hint">한 줄에 하나씩, 1회부터 순서대로 입력하세요.</div>
    </div>
    <div class="modal-actions">
      <button class="save-btn" id="saveCourseBtn">저장</button>
      ${id ? '<button class="delete-btn" id="deleteCourseBtn">삭제</button>' : ''}
    </div>
  `;

  const variantRowsEl = document.getElementById('variantRows');
  function addVariantRow(v){
    const row = document.createElement('div');
    row.className = 'variant-edit-row';
    row.innerHTML = `
      <input type="text" placeholder="예: 월수금반" class="v-label" value="${escapeHtml(v?.label||'')}">
      <input type="text" placeholder="시간 (예: 주3회 12:30~16:30)" class="v-time" value="${escapeHtml(v?.time||'')}">
      <input type="text" placeholder="개강~종강 (예: 7/24(금) ~ 8/14(금))" class="v-period" value="${escapeHtml(v?.period||'')}">
      <button type="button">✕</button>
    `;
    row.querySelector('button').addEventListener('click', ()=> row.remove());
    variantRowsEl.appendChild(row);
  }
  (c.variants && c.variants.length ? c.variants : [{}]).forEach(addVariantRow);
  document.getElementById('addVariantBtn').addEventListener('click', ()=> addVariantRow());

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('saveCourseBtn').addEventListener('click', async ()=>{
    const variants = [...variantRowsEl.querySelectorAll('.variant-edit-row')].map(row=>({
      label: row.querySelector('.v-label').value.trim(),
      time: row.querySelector('.v-time').value.trim(),
      period: row.querySelector('.v-period').value.trim()
    })).filter(v=>v.label || v.time || v.period);

    const sessions = document.getElementById('f-sessions').value
      .split('\n').map(s=>s.trim()).filter(Boolean);

    const data = {
      category: document.getElementById('f-category').value,
      title: document.getElementById('f-title').value.trim(),
      textbook: document.getElementById('f-textbook').value.trim(),
      target: document.getElementById('f-target').value.trim(),
      feature: document.getElementById('f-feature').value.trim(),
      note: document.getElementById('f-note').value.trim(),
      variants, sessions,
      order: c.order ?? Date.now()
    };

    if(!data.title){ alert('강좌명을 입력해주세요.'); return; }

    const btn = document.getElementById('saveCourseBtn');
    btn.disabled = true; btn.textContent = '저장 중...';
    try{
      if(id){
        await setDoc(doc(db, "courses", id), data);
      }else{
        await addDoc(collection(db, "courses"), data);
      }
      closeModal();
    }catch(err){
      alert('저장 중 문제가 발생했습니다: ' + err.message);
    }finally{
      btn.disabled = false; btn.textContent = '저장';
    }
  });

  if(id){
    document.getElementById('deleteCourseBtn').addEventListener('click', async ()=>{
      if(!confirm(`'${c.title}' 강좌를 삭제할까요? 이미 접수된 신청 내역에는 영향이 없습니다.`)) return;
      try{
        await deleteDoc(doc(db, "courses", id));
        closeModal();
      }catch(err){
        alert('삭제 중 문제가 발생했습니다: ' + err.message);
      }
    });
  }

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });

document.getElementById('seedBtn').addEventListener('click', async ()=>{
  if(!confirm('19개 기본 강좌 데이터를 업로드할까요? 이미 강좌가 있다면 중복으로 추가될 수 있어요.')) return;
  const btn = document.getElementById('seedBtn');
  btn.disabled = true; btn.textContent = '업로드 중...';
  try{
    for(let i=0;i<SEED_COURSES.length;i++){
      await addDoc(collection(db, "courses"), { ...SEED_COURSES[i], order:i });
    }
    alert('업로드가 완료되었습니다.');
  }catch(err){
    alert('업로드 중 문제가 발생했습니다: ' + err.message);
  }finally{
    btn.disabled = false; btn.textContent = '초기 강좌 데이터 업로드';
  }
});
</script>
